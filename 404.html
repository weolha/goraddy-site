<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OLO-G Games Inc. — 페이지를 찾을 수 없습니다</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="stylesheet" href="style.css">
<script>
/* /go/<코드> 딥링크 폴백 — GitHub Pages는 동적 경로가 없으므로
 * 404로 들어온 .../go/<코드>를 .../go/?c=<코드>로 재작성한다.
 * 루트(/go/snu)·서브패스(/goraddy/go/snu)·임시 URL(/goraddy-site/...) 모두 대응. */
(function () {
  var path = location.pathname;
  var idx = path.indexOf('/go/');
  if (idx !== -1) {
    var code = path.slice(idx + 4).replace(/\/+$/, '');
    if (code && code.indexOf('/') === -1) {
      var base = path.slice(0, idx);
      location.replace(base + '/go/?c=' + encodeURIComponent(code) + location.search.replace(/^\?/, '&'));
    }
  }
})();
</script>
<style>
  .nf-wrap{min-height:70vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;padding:24px}
  .nf-wrap img{height:60px;width:auto}
  .nf-wrap h1{font-size:3rem;margin:0.2rem 0}
  .nf-wrap a{font-weight:700}
</style>
</head>
<body>
<div class="nf-wrap">
  <img src="assets/logo.png" alt="OLO-G Games Inc.">
  <h1>404</h1>
  <p>페이지를 찾을 수 없습니다.</p>
  <a href="index.html">홈으로 돌아가기</a>
</div>
</body>
</html>
